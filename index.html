        // Motor de Persistencia Local
        function saveState() {
            try { localStorage.setItem('mundial2026_tracker_data_v2', JSON.stringify(state)); }

        function loadState() {
            try {
                const savedData = localStorage.getItem('mundial2026_tracker_data_v2');
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    if (parsed.groupScores) state.groupScores = parsed.groupScores;
                    if (parsed.knockoutScores) state.knockoutScores = parsed.knockoutScores;

            } catch (e) { console.error("Error cargando datos locales:", e); }

        function getFlag(team, classes = "w-6 h-4 sm:w-7 sm:h-5 object-cover rounded-[2px] shadow-[0_0_2px_rgba(0,0,0,0.5)] flex-shrink-0") {
            if (!team) return `<div class="${classes} bg-slate-700"></div>`;
            const code = teamCodes[team];
            if (!code) return `<span class="text-xs">⏳</span>`;
            return `<img src="https://flagcdn.com/w40/${code}.png" alt="${team}" class="${classes}" />`;
        }

        function getStandings() {
            const tables = {};
            Object.keys(groupsData).forEach(group => {
                const teams = groupsData[group];
                const stats = {};
                teams.forEach(t => stats[t] = { pts: 0, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0 });

                const matches = generateGroupMatches(group, teams);
                matches.forEach((match, idx) => {
                    const score = state.groupScores[`${group}_${idx}`];
                    if (score && score.t1 !== '' && score.t2 !== '' && score.t1 !== undefined && score.t2 !== undefined) {
                        const s1 = parseInt(score.t1);
                        const s2 = parseInt(score.t2);
                        stats[match.t1].p += 1; stats[match.t2].p += 1;
                        stats[match.t1].gf += s1; stats[match.t2].gf += s2;
                        stats[match.t1].ga += s2; stats[match.t2].ga += s1;
                        
                        if (s1 > s2) { stats[match.t1].pts += 3; stats[match.t1].w += 1; stats[match.t2].l += 1; }
                        else if (s2 > s1) { stats[match.t2].pts += 3; stats[match.t2].w += 1; stats[match.t1].l += 1; }
                        else { stats[match.t1].pts += 1; stats[match.t2].pts += 1; stats[match.t1].d += 1; stats[match.t2].d += 1; }
                    }
                });

                Object.keys(stats).forEach(t => stats[t].gd = stats[t].gf - stats[t].ga);
                tables[group] = Object.entries(stats).sort((a, b) => {
                    if (b[1].pts !== a[1].pts) return b[1].pts - a[1].pts;
                    if (b[1].gd !== a[1].gd) return b[1].gd - a[1].gd;
                    return b[1].gf - a[1].gf;
                });
            });
            return tables;
        }

        function getAdvancingTeams() {
            const st = getStandings();
            const seeds = {};
            Object.keys(st).forEach(group => {
                const teams = st[group];
                if (teams[0]) seeds[`1${group}`] = teams[0][0];
                if (teams[1]) seeds[`2${group}`] = teams[1][0];
            });
            return seeds;
        }

        function getThirdPlaceTeam(group) {
            const st = getStandings()[group];
            return st && st[2] ? st[2][0] : null;
        }

        window.setWildcard = function(key, val) {
            state.wildcardSelections[key] = val;
            saveState();
            renderApp();
        };

        function getWinnerKnockout(stage, matchNum) {
            const score = state.knockoutScores[`${stage}_${matchNum}`];
            if (!score) return null;
            const s1 = parseInt(score.s1);
            const s2 = parseInt(score.s2);
            if (isNaN(s1) || isNaN(s2)) return null;
            
            let t1 = getKnockoutTeam(stage, matchNum, 0);
            let t2 = getKnockoutTeam(stage, matchNum, 1);
            
            if (s1 > s2) return t1;
            if (s2 > s1) return t2;
            if (s1 === s2) {
                const p1 = parseInt(score.p1);
                const p2 = parseInt(score.p2);
                if (!isNaN(p1) && !isNaN(p2)) {
                    if (p1 > p2) return t1;
                    if (p2 > p1) return t2;
                }
            }
            return null;
        }

        function getKnockoutTeam(stage, matchNum, teamIdx) {
            if (stage === '16vos') {
                const matchup = roundOf32Matchups[matchNum - 1];
                if (!matchup) return null;
                const code = teamIdx === 0 ? matchup.t1 : matchup.t2;
                
                if (code.startsWith('3 ')) {
                    const matchKey = `16vos_${matchNum}_t${teamIdx+1}`;
                    return state.wildcardSelections[matchKey] || null;
                }
                
                const seeds = getAdvancingTeams();
                return seeds[code] || null;
            }
            
            if (stage === '8vos') {
                const mapping8vos = [
                    [2, 5], [1, 3], [11, 12], [9, 10], [4, 6], [7, 8], [14, 16], [13, 15]
                ];
                const prevMatchNum = mapping8vos[matchNum - 1][teamIdx];
                return getWinnerKnockout('16vos', prevMatchNum);
            }
            
            let prevStage = stage === '8vos' ? '16vos' : stage === '4tos' ? '8vos' : stage === 'semis' ? '4tos' : 'semis';
            const prevMatchNum = (matchNum - 1) * 2 + teamIdx + 1;
            return getWinnerKnockout(prevStage, prevMatchNum);
        }

        window.setTab = function(tab) { state.activeTab = tab; renderApp(); };

        window.setScore = function(group, idx, team, val) {
            if (!state.groupScores[`${group}_${idx}`]) state.groupScores[`${group}_${idx}`] = {t1: '', t2: ''};
            state.groupScores[`${group}_${idx}`][team] = val === '' ? '' : Math.max(0, parseInt(val));
            saveState();
            renderApp();
        };

        window.setKnockout = function(stage, matchNum, field, val) {
            if (!state.knockoutScores[`${stage}_${matchNum}`]) state.knockoutScores[`${stage}_${matchNum}`] = {s1:'', s2:'', p1:'', p2:''};
            state.knockoutScores[`${stage}_${matchNum}`][field] = val;
            saveState();
            renderApp();
        };

        window.setQuinielaBet = function(id, val) {
            state.quinielaBets[id] = val;
            const qIdx = state.quinielas.findIndex(q => q.id === state.currentQuinielaId);
            if (qIdx !== -1) {
                state.quinielas[qIdx].bets[id] = val;
            }
            saveState();
            renderApp();
        };

        window.selectQuiniela = function(id) {
            const q = state.quinielas.find(x => x.id === id);
            if (q) {
                state.currentQuinielaId = id;
                state.activeQuinielaMatches = [...q.matches];
                state.quinielaBets = {...q.bets};
                renderApp();
            }
        };

        window.deleteQuiniela = function(id) {
            if (state.quinielas.length <= 1) return;
            state.quinielas = state.quinielas.filter(q => q.id !== id);
            if (state.currentQuinielaId === id) {
                const first = state.quinielas[0];
                state.currentQuinielaId = first.id;
                state.activeQuinielaMatches = [...first.matches];
                state.quinielaBets = {...first.bets};
            }
            saveState();
            renderApp();
        };

        window.openRenameModal = function(id, currentName) {
            state.renameId = id;
            state.renameText = currentName;
            state.showRenameModal = true;
            renderApp();
        };

        window.closeRenameModal = function() {
            state.showRenameModal = false;
            renderApp();
        };

        window.saveRename = function() {
            const q = state.quinielas.find(x => x.id === state.renameId);
            if (q && state.renameText.trim() !== '') {
                q.name = state.renameText.trim();
                saveState();
            }
            state.showRenameModal = false;
            renderApp();
        };

        window.openQuinielaModal = function() {
            state.customSize = state.activeQuinielaMatches.length;
            state.customSelections = state.activeQuinielaMatches.map(m => ({ matchRef: `${m.group}_${m.idx}`, bet: m.defaultBet || 'L' }));
            state.showQuinielaModal = true;
            renderApp();
        };

        window.closeQuinielaModal = function() { state.showQuinielaModal = false; renderApp(); };

        window.changeCustomSize = function(val) {
            let num = parseInt(val);
            if (isNaN(num) || num < 1) num = 1;
            if (num > 72) num = 72;
            state.customSize = num;
            while(state.customSelections.length < num) state.customSelections.push({ matchRef: '', bet: 'L' });
            state.customSelections = state.customSelections.slice(0, num);
            renderApp();
        };

        window.updateCustomSelection = function(i, field, val) {
            state.customSelections[i][field] = val;
            renderApp();
        };

        window.saveCustomQuiniela = function() {
            const allMatchesList = [];
            Object.keys(groupsData).forEach(group => {
                const matches = generateGroupMatches(group, groupsData[group]);
                matches.forEach((m, idx) => {
                    allMatchesList.push({ group, idx, t1: m.t1, t2: m.t2 });
                });
            });

            const newQuiniela = state.customSelections.map((sel, i) => {
                if(!sel.matchRef) return null;
                const matchParts = sel.matchRef.split('_');
                const group = matchParts[0];
                const idx = parseInt(matchParts[1]);
                const matchDetails = allMatchesList.find(m => m.group === group && m.idx === idx);
                if(!matchDetails) return null;
                return { id: i + 1, group, idx, t1: matchDetails.t1, t2: matchDetails.t2, defaultBet: sel.bet };
            }).filter(Boolean);
            
            newQuiniela.forEach((q, i) => q.id = i + 1);
            
            const newBets = {};
            newQuiniela.forEach(m => newBets[m.id] = m.defaultBet);
            
            const newId = Date.now();
            const newName = `Mi Quiniela ${state.quinielas.length + 1}`;
            
            state.quinielas.push({
                id: newId,
                name: newName,
                matches: newQuiniela,
                bets: newBets
            });
            
            state.currentQuinielaId = newId;
            state.activeQuinielaMatches = newQuiniela;
            state.quinielaBets = newBets;
            
            state.showQuinielaModal = false;
            saveState();
            renderApp();
        };

        window.loadDefaultQuiniela = function() {
            state.activeQuinielaMatches = [...quinielaMatchesBase];
            const initial = {};
            quinielaMatchesBase.forEach(m => initial[m.id] = m.defaultBet);
            state.quinielaBets = initial;
            saveState();
            renderApp();
        };

                <div class="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 overflow-y-auto fade-in">
                    <div class="bg-slate-900 border border-slate-700 rounded-xl shadow-2xl p-6 w-full max-w-2xl my-auto">
                        <h3 class="text-xl font-bold text-white mb-4">Configurar Nueva Quiniela</h3>
                        <div class="mb-4">
                            <label class="text-sm text-slate-400 block mb-1">Cantidad de Partidos:</label>
                            <input type="number" min="1" max="72" value="${state.customSize}" onchange="changeCustomSize(this.value)" class="bg-slate-800 text-white border border-slate-700 rounded px-3 py-2 w-32 focus:outline-none focus:border-blue-500" />
                        </div>
                        <div class="max-h-[50vh] overflow-y-auto space-y-3 mb-6 pr-2">
                            ${state.customSelections.map((sel, i) => `
                            <div class="flex flex-col sm:flex-row gap-2 items-center bg-slate-800 p-2 rounded border border-slate-700">
                                <span class="text-slate-500 font-mono w-6 text-center">${i+1}</span>
                                <select onchange="updateCustomSelection(${i}, 'matchRef', this.value)" class="flex-1 bg-slate-950 text-slate-300 border border-slate-600 rounded p-2 text-sm w-full sm:w-auto focus:outline-none focus:border-blue-500">
                                    <option value="">-- Selecciona un partido --</option>
                                    ${allMatchesList.map(m => `<option value="${m.group}_${m.idx}" ${sel.matchRef === `${m.group}_${m.idx}` ? 'selected' : ''}>${m.label}</option>`).join('')}
                                </select>
                                <div class="flex gap-1 shrink-0">
                                    ${['L','E','V'].map(b => `<button onclick="updateCustomSelection(${i}, 'bet', '${b}')" class="w-10 h-10 rounded font-bold text-sm transition-all ${sel.bet === b ? 'bg-purple-600 text-white shadow-inner scale-105' : 'bg-slate-900 text-slate-400 border border-slate-600 hover:bg-slate-700'}">${b}</button>`).join('')}
                                </div>
                            </div>
                            `).join('')}
                        </div>
                        <div class="flex justify-end gap-3 pt-4 border-t border-slate-700">
                            <button onclick="closeQuinielaModal()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded transition-all">Cancelar</button>
                            <button onclick="saveCustomQuiniela()" class="px-4 py-2 bg-green-600 hover:bg-green-500 text-white font-bold rounded shadow transition-all">Guardar Quiniela</button>
                        </div>
                    </div>
                </div>`;
            }

            if (state.showRenameModal) {
                contentHtml += `
                <div class="fixed inset-0 z-[70] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 fade-in">
                    <div class="bg-slate-900 border border-slate-700 rounded-xl shadow-2xl p-6 w-full max-w-sm my-auto">
                        <h3 class="text-lg font-bold text-white mb-4">Renombrar Quiniela</h3>
                        <input type="text" value="${state.renameText}" oninput="state.renameText = this.value" class="bg-slate-800 text-white border border-slate-600 rounded px-3 py-2 w-full focus:outline-none focus:border-purple-500 mb-6" placeholder="Nombre de la quiniela..." />
                        <div class="flex justify-end gap-3">
                            <button onclick="closeRenameModal()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded transition-all text-sm">Cancelar</button>
                            <button onclick="saveRename()" class="px-4 py-2 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded shadow transition-all text-sm">Guardar</button>
                        </div>
                    </div>
                </div>`;
            }

            app.innerHTML = headerHtml + contentHtml;
        }

        window.onload = function() {
            loadState();
            renderApp();
        };

        // --- INICIO DEL REGISTRO DEL SERVICE WORKER (PWA) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('ServiceWorker registrado con éxito:', registration.scope);
                }).catch(error => {
                    console.log('Fallo el registro del ServiceWorker:', error);
                });
            });
        }
        // --- FIN DEL REGISTRO DEL SERVICE WORKER ---
    </script>
</body>
</html>
